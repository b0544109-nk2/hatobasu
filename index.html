<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#2026夏のはとバス遠足っ おたのしみBINGO</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#1f9e94;}
  body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic UI",system-ui,sans-serif;}
  .stage{position:relative;max-width:560px;margin:0 auto;}
  .stage img.bg{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none;pointer-events:none;}
  .cell{position:absolute;border:none;background:transparent;cursor:pointer;padding:0;margin:0;border-radius:14px;}
  .cell:active{transform:scale(.96);}
  .cell .ring{position:absolute;inset:0;margin:auto;width:78%;height:78%;
    border:6px solid #e8503f;border-radius:50%;opacity:0;transform:scale(.4) rotate(-12deg);
    transition:opacity .16s ease, transform .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
  .cell.marked .ring{opacity:.95;transform:scale(1) rotate(-8deg);}
  .cell.marked{background:rgba(255,255,255,.28);}
  .cell.line-hit{box-shadow:0 0 0 4px #fdf0a8;}
  .bar{position:sticky;bottom:0;z-index:30;max-width:560px;margin:0 auto;background:#274f8c;color:#fff;
    display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:10px 14px;font-weight:700;font-size:13px;}
  .bar .b{color:#fdf0a8;font-size:17px;}
  .bar button{background:#fdf0a8;border:none;color:#274f8c;font-family:inherit;font-weight:800;
    font-size:13px;border-radius:999px;padding:8px 16px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.18);}
  .bar button:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.18);}
  .overlay{position:fixed;inset:0;background:rgba(25,45,75,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:24px;backdrop-filter:blur(2px);}
  .overlay.show{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fdf6e9;border-radius:28px;max-width:380px;width:100%;padding:30px 24px 26px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .modal h2{font-size:32px;margin:0 0 6px;color:#178b82;letter-spacing:.04em;line-height:1.2;}
  .modal h2.full{color:#e8503f;}
  .modal .sub{font-weight:700;font-size:14px;color:#274f8c;margin:0 0 20px;line-height:1.6;}
  .btn{display:block;width:100%;font-family:inherit;font-weight:800;font-size:15px;border:none;border-radius:999px;
    padding:14px;margin-top:10px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.15);text-decoration:none;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .btn.tweet{background:#111;color:#fff;}
  .btn.save{background:#1f9e94;color:#fff;}
  .btn.close{background:#f4f1ea;color:#2b3a4a;box-shadow:0 5px 0 rgba(0,0,0,.1);}
  .modal .hint{font-size:11px;color:#7a8694;margin:12px 2px 0;line-height:1.5;}
  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
    z-index:45;background:#274f8c;color:#fff;font-weight:800;font-size:14px;
    padding:12px 20px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.28);
    opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;max-width:90vw;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:40;}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <img class="bg" id="bg" src="bg.png" alt="はとバス遠足っ おたのしみBINGO">
  </div>

  <div class="bar">
    <span>✅ <span id="markCount">0</span>/25</span>
    <span>🎉 BINGO <span class="b" id="bingoCount">0</span> 列</span>
    <button id="saveBtn">📷 画像を保存</button>
  </div>

  <canvas id="confetti"></canvas>
  <div id="toast"></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">BINGO! 🎉</h2>
      <p class="sub" id="modalSub"></p>
      <button class="btn save" id="saveBtn2">📷 盤面を画像で保存</button>
      <a class="btn tweet" id="tweetBtn" target="_blank" rel="noopener">🐦 ツイート画面をひらく</a>
      <button class="btn close" id="closeBtn">つづける</button>
      <p class="hint">保存した画像をツイートに添付すると、盤面付きで報告できます📎</p>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var KEY="hatobus2026_bingo_overlay_v2", HASHTAG="#2026夏のはとバス遠足っ";
  var COORDS=[[6.29, 34.898, 16.004, 10.905], [24.237, 34.898, 15.911, 10.905], [41.998, 34.898, 16.004, 10.905], [59.852, 34.898, 16.004, 10.905], [77.706, 34.898, 16.004, 10.905], [6.29, 47.191, 16.004, 10.905], [24.237, 47.191, 15.911, 10.905], [41.998, 47.191, 16.004, 10.905], [59.852, 47.191, 16.004, 10.905], [77.706, 47.191, 16.004, 10.905], [6.29, 59.418, 16.004, 10.905], [24.237, 59.418, 15.911, 10.905], [41.998, 59.418, 16.004, 10.905], [59.852, 59.418, 16.004, 10.905], [77.706, 59.418, 16.004, 10.905], [6.29, 71.646, 16.004, 10.905], [24.237, 71.646, 15.911, 10.905], [41.998, 71.646, 16.004, 10.905], [59.852, 71.646, 16.004, 10.905], [77.706, 71.646, 16.004, 10.905], [6.29, 83.939, 16.004, 10.905], [24.237, 83.939, 15.911, 10.905], [41.998, 83.939, 16.004, 10.905], [59.852, 83.939, 16.004, 10.905], [77.706, 83.939, 16.004, 10.905]];
  var marked=new Array(25).fill(false), prevBingo=0;

  var LINES=[];
  for(var r=0;r<5;r++) LINES.push([0,1,2,3,4].map(function(c){return r*5+c;}));
  for(var c=0;c<5;c++) LINES.push([0,1,2,3,4].map(function(r){return r*5+c;}));
  LINES.push([0,6,12,18,24]); LINES.push([4,8,12,16,20]);
  var FULL=LINES.length; // 12

  function load(){try{var raw=localStorage.getItem(KEY);if(raw){var a=JSON.parse(raw);if(Array.isArray(a)&&a.length===25)marked=a.map(Boolean);}}catch(e){}}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(marked));}catch(e){}}

  var stage=document.getElementById("stage"), cellEls=[];
  COORDS.forEach(function(p,i){
    var b=document.createElement("button");
    b.className="cell"; b.setAttribute("aria-pressed","false");
    b.style.left=p[0]+"%"; b.style.top=p[1]+"%"; b.style.width=p[2]+"%"; b.style.height=p[3]+"%";
    b.innerHTML='<span class="ring"></span>';
    b.addEventListener("click",function(){toggle(i);});
    stage.appendChild(b); cellEls.push(b);
  });

  function countBingo(){var n=0;LINES.forEach(function(l){if(l.every(function(i){return marked[i];}))n++;});return n;}
  function hitCells(){var s={};LINES.forEach(function(l){if(l.every(function(i){return marked[i];}))l.forEach(function(i){s[i]=1;});});return s;}
  function render(){
    var hit=hitCells();
    cellEls.forEach(function(el,i){
      el.classList.toggle("marked",marked[i]);
      el.classList.toggle("line-hit",!!hit[i]&&marked[i]);
      el.setAttribute("aria-pressed",marked[i]?"true":"false");
    });
    var bc=countBingo();
    document.getElementById("markCount").textContent=marked.filter(Boolean).length;
    document.getElementById("bingoCount").textContent=bc;
    return bc;
  }
  function toggle(i){marked[i]=!marked[i];save();var bc=render();if(bc>prevBingo)celebrate(bc);prevBingo=bc;}

  var toastTimer=null;
  function showToast(msg){
    var t=document.getElementById("toast");
    t.innerHTML=msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){t.classList.remove("show");},2600);
  }

  function celebrate(bc){
    var isFull=(bc>=FULL);
    // モーダルは「最初の1ビンゴ」と「フルビンゴ」のみ。途中はトーストで邪魔しない
    if(bc===1 || isFull){
      var title=document.getElementById("modalTitle");
      title.className=isFull?"full":"";
      title.innerHTML=isFull?"フルBINGO!! 🎊👑":"BINGO! 🎉";
      document.getElementById("modalSub").innerHTML=isFull
        ?"全マス制覇、おめでとう🎉🎉<br>早速幹事の誰かに報告しよう！！"
        :"はじめてのBINGO！🎉<br>ハッシュタグで報告しよう！";
      var text=isFull
        ?"おたのしみBINGO全マス制覇！フルBINGO達成っ🎊👑 "+HASHTAG
        :"おたのしみBINGOで1BINGOしましたっ🎉 "+HASHTAG;
      document.getElementById("tweetBtn").href="https://twitter.com/intent/tweet?text="+encodeURIComponent(text);
      document.getElementById("overlay").classList.add("show");
    }else{
      showToast("🎉 "+bc+"列BINGO！");
    }
    fireConfetti();
  }
  document.getElementById("closeBtn").addEventListener("click",function(){document.getElementById("overlay").classList.remove("show");});
  document.getElementById("overlay").addEventListener("click",function(e){if(e.target.id==="overlay")document.getElementById("overlay").classList.remove("show");});

  // ---- 画像保存（背景＋〇を合成してPNG出力）----
  function saveImage(){
    var img=document.getElementById("bg");
    var W=img.naturalWidth||1081, H=img.naturalHeight||1513;
    var cv=document.createElement("canvas"); cv.width=W; cv.height=H;
    var x=cv.getContext("2d");
    x.drawImage(img,0,0,W,H);
    x.strokeStyle="#e8503f"; x.lineWidth=Math.round(W*0.011);
    COORDS.forEach(function(p,i){
      if(!marked[i])return;
      var cx=(p[0]+p[2]/2)/100*W, cy=(p[1]+p[3]/2)/100*H;
      var rad=Math.min(p[2]/100*W,p[3]/100*H)*0.39;
      x.beginPath(); x.ellipse(cx,cy,rad,rad,0,0,Math.PI*2); x.stroke();
    });
    try{
      var url=cv.toDataURL("image/png");
      var a=document.createElement("a");
      a.href=url; a.download="hatobus_bingo.png";
      document.body.appendChild(a); a.click(); a.remove();
    }catch(e){ alert("画像の保存に失敗しました。スクリーンショットでも保存できます。"); }
  }
  document.getElementById("saveBtn").addEventListener("click",saveImage);
  document.getElementById("saveBtn2").addEventListener("click",saveImage);

  // ---- confetti ----
  var canvas=document.getElementById("confetti"),ctx=canvas.getContext("2d"),parts=[],anim=null;
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
  resize();addEventListener("resize",resize);
  var CL=["#fdf0a8","#f4a9c0","#1f9e94","#2f5fa6","#e8503f","#ffffff"];
  function fireConfetti(){
    if(window.matchMedia&&matchMedia("(prefers-reduced-motion:reduce)").matches)return;
    for(var i=0;i<150;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight/2-60,
      vx:(Math.random()-.5)*9,vy:Math.random()*-11-4,g:.32+Math.random()*.12,s:6+Math.random()*7,
      c:CL[(Math.random()*CL.length)|0],rot:Math.random()*6.28,vr:(Math.random()-.5)*.3,life:0});
    if(!anim)loop();
  }
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(function(p){p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
      ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();});
    parts=parts.filter(function(p){return p.y<canvas.height+40&&p.life<220;});
    if(parts.length)anim=requestAnimationFrame(loop);else{ctx.clearRect(0,0,canvas.width,canvas.height);anim=null;}
  }

  load();prevBingo=render();
})();
</script>
</body>
</html>
